<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580">
  <rect width="1200" height="580" fill="#0b1020"/>
  <text x="600" y="50" font-size="32" fill="#e5e7eb" text-anchor="middle" font-family="Arial">How Constructivist AI Works</text>

  <!-- Step 1: Raw Input -->
  <rect x="30" y="100" width="170" height="100" rx="12" fill="#1f2937" stroke="#60a5fa" stroke-width="2"/>
  <text x="115" y="143" font-size="18" fill="#dbeafe" text-anchor="middle" font-family="Arial">1. Raw Input</text>
  <text x="115" y="168" font-size="14" fill="#93c5fd" text-anchor="middle" font-family="Arial">Token sequence</text>
  <text x="115" y="188" font-size="14" fill="#93c5fd" text-anchor="middle" font-family="Arial">[l] learn</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="150" x2="235" y2="150" stroke="#475569" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Step 2: Symbol Registry -->
  <rect x="235" y="100" width="185" height="100" rx="12" fill="#1f2937" stroke="#34d399" stroke-width="2"/>
  <text x="327" y="143" font-size="18" fill="#d1fae5" text-anchor="middle" font-family="Arial">2. Symbols</text>
  <text x="327" y="168" font-size="14" fill="#a7f3d0" text-anchor="middle" font-family="Arial">L/R context counts</text>
  <text x="327" y="188" font-size="14" fill="#a7f3d0" text-anchor="middle" font-family="Arial">per token</text>

  <!-- Arrow 2 -->
  <line x1="420" y1="150" x2="455" y2="150" stroke="#475569" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Step 3: Pattern Mining -->
  <rect x="455" y="100" width="185" height="100" rx="12" fill="#1f2937" stroke="#f59e0b" stroke-width="2"/>
  <text x="547" y="136" font-size="18" fill="#fef3c7" text-anchor="middle" font-family="Arial">3. Patterns</text>
  <text x="547" y="158" font-size="14" fill="#fde68a" text-anchor="middle" font-family="Arial">Typed slots: [1][2]</text>
  <text x="547" y="178" font-size="14" fill="#fde68a" text-anchor="middle" font-family="Arial">[C][X], optionals</text>
  <text x="547" y="198" font-size="14" fill="#fde68a" text-anchor="middle" font-family="Arial">commutativity</text>

  <!-- Arrow 3 -->
  <line x1="640" y1="150" x2="675" y2="150" stroke="#475569" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Step 4: Pattern Families -->
  <rect x="675" y="100" width="185" height="100" rx="12" fill="#1f2937" stroke="#c084fc" stroke-width="2"/>
  <text x="767" y="136" font-size="18" fill="#f3e8ff" text-anchor="middle" font-family="Arial">4. Families</text>
  <text x="767" y="158" font-size="14" fill="#e9d5ff" text-anchor="middle" font-family="Arial">Cluster structurally</text>
  <text x="767" y="178" font-size="14" fill="#e9d5ff" text-anchor="middle" font-family="Arial">equivalent patterns</text>
  <text x="767" y="198" font-size="14" fill="#e9d5ff" text-anchor="middle" font-family="Arial">into PF# templates</text>

  <!-- Arrow 4 -->
  <line x1="860" y1="150" x2="895" y2="150" stroke="#475569" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Step 5: Knowledge State -->
  <rect x="895" y="100" width="270" height="100" rx="12" fill="#1f2937" stroke="#f472b6" stroke-width="2"/>
  <text x="1030" y="143" font-size="18" fill="#fce7f3" text-anchor="middle" font-family="Arial">5. Knowledge State</text>
  <text x="1030" y="168" font-size="14" fill="#fbcfe8" text-anchor="middle" font-family="Arial">Symbols · Patterns · Families</text>
  <text x="1030" y="188" font-size="14" fill="#fbcfe8" text-anchor="middle" font-family="Arial">Relations · Equivalents</text>

  <!-- Inference section label -->
  <text x="600" y="265" font-size="20" fill="#9ca3af" text-anchor="middle" font-family="Arial">— Inference Phase —</text>

  <!-- Query box -->
  <rect x="30" y="300" width="170" height="80" rx="12" fill="#1f2937" stroke="#60a5fa" stroke-width="2"/>
  <text x="115" y="335" font-size="18" fill="#dbeafe" text-anchor="middle" font-family="Arial">Query</text>
  <text x="115" y="360" font-size="14" fill="#93c5fd" text-anchor="middle" font-family="Arial">partial sequence</text>

  <!-- Arrow to analyze/generate -->
  <line x1="200" y1="340" x2="260" y2="380" stroke="#475569" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="200" y1="340" x2="260" y2="310" stroke="#475569" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Analyze box -->
  <rect x="260" y="280" width="240" height="80" rx="12" fill="#1f2937" stroke="#c084fc" stroke-width="2"/>
  <text x="380" y="315" font-size="18" fill="#f3e8ff" text-anchor="middle" font-family="Arial">[a] Analyze</text>
  <text x="380" y="340" font-size="14" fill="#e9d5ff" text-anchor="middle" font-family="Arial">Raw candidate matches</text>

  <!-- Generate box -->
  <rect x="260" y="370" width="240" height="80" rx="12" fill="#1f2937" stroke="#f472b6" stroke-width="2"/>
  <text x="380" y="405" font-size="18" fill="#fce7f3" text-anchor="middle" font-family="Arial">[g] Generate</text>
  <text x="380" y="430" font-size="14" fill="#fbcfe8" text-anchor="middle" font-family="Arial">Ranked + normalized output</text>

  <!-- Arrow from Generate to Normalization -->
  <line x1="500" y1="410" x2="560" y2="410" stroke="#475569" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Normalization box -->
  <rect x="560" y="370" width="320" height="80" rx="12" fill="#1f2937" stroke="#34d399" stroke-width="2"/>
  <text x="720" y="405" font-size="18" fill="#d1fae5" text-anchor="middle" font-family="Arial">Structural Normalization</text>
  <text x="720" y="430" font-size="14" fill="#a7f3d0" text-anchor="middle" font-family="Arial">Choose equiv. by learned L/R frequencies</text>

  <!-- Arrow from Analyze to Output -->
  <line x1="500" y1="320" x2="900" y2="320" stroke="#475569" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Arrow from Normalization to Output -->
  <line x1="880" y1="410" x2="900" y2="410" stroke="#475569" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="920" y1="345" x2="920" y2="390" stroke="#475569" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Output box -->
  <rect x="900" y="295" width="265" height="130" rx="12" fill="#1f2937" stroke="#22d3ee" stroke-width="2"/>
  <text x="1032" y="340" font-size="18" fill="#cffafe" text-anchor="middle" font-family="Arial">Output</text>
  <text x="1032" y="365" font-size="14" fill="#a5f3fc" text-anchor="middle" font-family="Arial">Inferred completions /</text>
  <text x="1032" y="385" font-size="14" fill="#a5f3fc" text-anchor="middle" font-family="Arial">relations / structure</text>
  <text x="1032" y="405" font-size="14" fill="#a5f3fc" text-anchor="middle" font-family="Arial">[v] view full state</text>

  <!-- View box -->
  <rect x="460" y="490" width="280" height="70" rx="12" fill="#1f2937" stroke="#22d3ee" stroke-width="2"/>
  <text x="600" y="525" font-size="17" fill="#cffafe" text-anchor="middle" font-family="Arial">[v] View — full transparency</text>
  <text x="600" y="548" font-size="13" fill="#a5f3fc" text-anchor="middle" font-family="Arial">Inspect symbols, patterns, families, relations</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
